# Codex (OpenAI's CLI). A hook-parity agent: Codex fires Claude-style lifecycle hooks
# from ~/.codex/hooks.json, so the installer below wires SessionStart / UserPromptSubmit
# / PermissionRequest / PostToolUse / Stop to the pod helpers. With the hooks wired,
# state dots flip instantly and pod-mail is injected silently as context at Codex's
# next prompt — no send-keys needed. Skip the hook install and Codex still runs in a
# pod via the poll/send-keys floor (override [lifecycle] back to poll in
# ~/.config/pod/adapters/ so the poller owns it — see docs/adapters.md).
[agent]
id       = "codex"
label    = "Codex"
priority = 20

[launch]
base_cmd   = "codex"
model_arg  = ["-m", "{model}"]
effort_arg = ["-c", "model_reasoning_effort={effort}"]

[detect]
# Codex runs as a Node TUI -> pane command is "node". "node" is ambiguous (cursor,
# gemini, opencode can also be node), so confirm with a content pattern when present.
pane_cmd_patterns = ['^node$']
content_patterns  = ['(?i)codex', 'model_reasoning_effort']
reject_content    = []

[defaults]
model             = "inherit"
effort            = ""
# Scrape "<model> <effort> · <cwd>" from the footer (e.g. "gpt-5.5 high · ~"). Group 1
# = model (must contain a digit), group 2 = effort (a known level). Only used when the
# poller owns the window (the poll-floor override); with hooks wired the poller backs off.
card_scrape_regex = '^\s*([A-Za-z][\w.\-]*\d[\w.\-]*)\s+(minimal|low|medium|high|xhigh|max|none)\b.*·'

[lifecycle]
mode            = "hooks"
installer       = "hooks/codex/install.sh"
native_delivery = true
state_source    = "hooks"

# Query the locally installed Codex /model menu. This reflects the account/provider
# Codex is actually using, unlike the public platform API model index.
[discover]
models_cmd    = "pod-discover-local-agent codex"
models_format = "tsv"
timeout_s     = 35
ttl_s         = 300
efforts = [
  { slug = "high",    label = "high",    value = "high" },
  { slug = "medium",  label = "medium",  value = "medium" },
  { slug = "low",     label = "low",     value = "low" },
  { slug = "minimal", label = "minimal", value = "minimal" },
]
