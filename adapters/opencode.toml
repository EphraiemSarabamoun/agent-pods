# OpenCode (open-source terminal agent). Poll agent. The bundled adapter inherits
# OpenCode's locally configured provider/model rather than shipping a model catalog.
[agent]
id       = "opencode"
label    = "OpenCode"
priority = 46

[launch]
base_cmd   = "opencode"
model_arg  = ["--model", "{model}"]
effort_arg = []

[detect]
pane_cmd_patterns = ['^(opencode|node|bun)$']
content_patterns  = ['(?i)opencode']
reject_content    = []

[defaults]
model             = "inherit"
effort            = ""
card_scrape_regex = ''

[lifecycle]
mode            = "poll"
installer       = ""
native_delivery = false
state_source    = "poll"
