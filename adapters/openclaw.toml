# OpenClaw (self-hosted agent runtime). Poll agent.
# base_cmd assumes an `openclaw` CLI on PATH; if you front it with a wrapper (e.g. one
# that SSHes to a GPU box), point base_cmd at that wrapper instead. The bundled adapter
# inherits OpenClaw's own configured model because a separate `ollama list` is not proof
# that OpenClaw is actually configured to use those models.
[agent]
id       = "openclaw"
label    = "OpenClaw"
priority = 48

[launch]
# Assumes an `openclaw` CLI on PATH. If you front it with a wrapper instead (e.g. one
# that SSHes to a GPU box running the TUI), point base_cmd at that wrapper's name.
base_cmd   = "openclaw"
model_arg  = ["--model", "{model}"]
effort_arg = []

[detect]
pane_cmd_patterns = ['^(openclaw|node|ssh)$']
content_patterns  = ['(?i)openclaw']
reject_content    = []

[defaults]
model             = "inherit"
effort            = ""
card_scrape_regex = ''

[lifecycle]
mode            = "poll"
installer       = ""
native_delivery = false
state_source    = "poll"
