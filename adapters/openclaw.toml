# OpenClaw (self-hosted agent runtime, often backed by a local Ollama). Poll agent.
# base_cmd assumes an `openclaw` CLI on PATH; if you front it with a wrapper (e.g. one
# that SSHes to a GPU box), point base_cmd at that wrapper instead. Models depend on
# your Ollama/backend — edit [[models]] to match `ollama list`.
[agent]
id       = "openclaw"
label    = "OpenClaw"
priority = 48

[launch]
# Assumes an `openclaw` CLI on PATH. If you front it with a wrapper instead (e.g. one
# that SSHes to a GPU box running the TUI), point base_cmd at that wrapper's name.
base_cmd   = "openclaw"
model_arg  = ["--model", "{model}"]
effort_arg = []

[detect]
pane_cmd_patterns = ['^(openclaw|node|ssh)$']
content_patterns  = ['(?i)openclaw']
reject_content    = []

[defaults]
model             = ""
effort            = ""
card_scrape_regex = ''

[lifecycle]
mode            = "poll"
installer       = ""
native_delivery = false
state_source    = "poll"

# Live discovery from the Ollama backend. `ollama list` prints a table whose first
# column is the model name (e.g. "qwen3:8b"), each followed by a 12-char hex id —
# the regex matches a name immediately followed by that id, which conveniently skips
# the "NAME  ID  SIZE  MODIFIED" header. If your Ollama backend is a REMOTE box, point
# this at it: models_cmd = "ssh <your-ollama-host> ollama list". No effort axis on Ollama.
[discover]
models_cmd   = "ollama list"
models_regex = '^(\S+)\s+[0-9a-f]{12}\b'
timeout_s    = 6
efforts      = []

# Fallback only — used if discovery fails (no ollama, backend down, etc.).
[[models]]
slug  = "default"
label = "Default"
model = ""
efforts = []
