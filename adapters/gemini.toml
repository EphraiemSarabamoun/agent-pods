# Gemini CLI (Google). Poll agent, no hooks. Until an installed Gemini build exposes
# reliable account-scoped discovery, the pod inherits Gemini's configured default.
[agent]
id       = "gemini"
label    = "Gemini CLI"
priority = 40

[launch]
base_cmd   = "gemini"
model_arg  = ["-m", "{model}"]
effort_arg = []

[detect]
pane_cmd_patterns = ['^(gemini|node)$']
content_patterns  = ['(?i)gemini']
reject_content    = []

[defaults]
model             = "inherit"
effort            = ""
card_scrape_regex = ''

[lifecycle]
mode            = "poll"
installer       = ""
native_delivery = false
state_source    = "poll"
