# Aider (open-source pair-programmer). Poll agent. Aider's known-model index is not
# an entitlement list, so the bundled adapter inherits the locally configured model.
[agent]
id       = "aider"
label    = "Aider"
priority = 45

[launch]
base_cmd   = "aider"
model_arg  = ["--model", "{model}"]
effort_arg = []

[detect]
pane_cmd_patterns = ['^(aider|python|python3)$']
content_patterns  = ['(?i)aider']
reject_content    = []

[defaults]
model             = "inherit"
effort            = ""
card_scrape_regex = ''

[lifecycle]
mode            = "poll"
installer       = ""
native_delivery = false
state_source    = "poll"
